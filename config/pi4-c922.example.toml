# Copy to: /etc/edge-camera-pipeline/pi4-c922.toml

[device]
id = "pi4-c922-01"

[mqtt]
host = "100.103.12.104" # Jetson NetBird IP
port = 1883
username = ""
password = ""
topic_prefix = "edge-camera"
qos = 1
keep_alive_seconds = 30

[rtsp]
enabled = true
listen_port = 8554
path = "pi4-c922-01"
advertise_host = "100.103.0.0" # set to THIS Pi's NetBird IP/DNS for clients (e.g. 100.103.x.y)
video_device = "/dev/video0"
width = 1280
height = 720
fps = 30

[wasm]
enabled = true
module_path = "/opt/edge-camera-pipeline/wasm/camera_processor.wasm"
tick_millis = 200

